{% extends 'base.html' %}
{% block title %}Ошибка сервера — ЮУрГУ{% endblock %}

{% block content %}
<div class="text-center py-5">
  <div style="font-size: 96px; line-height: 1; color: #dee2e6;">500</div>
  <h2 class="fw-semibold mt-3 mb-2">Ошибка сервера</h2>
  <p class="text-muted mb-4">
    Что-то пошло не так на нашей стороне. Попробуйте обновить страницу или вернитесь позже.
  </p>
  <div class="d-flex justify-content-center gap-3 flex-wrap">
    <a href="{% url 'core:home' %}" class="btn btn-primary">
      <i class="bi bi-house me-2"></i>На главную
    </a>
    <button onclick="window.location.reload()" class="btn btn-outline-secondary">
      <i class="bi bi-arrow-clockwise me-2"></i>Обновить страницу
    </button>
  </div>
</div>
{% endblock %}
