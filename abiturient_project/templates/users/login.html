
{% extends 'base.html' %}
{% block title %}Вход — ЮУрГУ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h3 class="fw-semibold text-center mb-4">Вход в аккаунт</h3>
      <form method="post">
        {% csrf_token %}
        {% for field in form %}
          <div class="mb-3">
            <label class="form-label">{{ field.label }}</label>
            <input type="{{ field.field.widget.input_type }}"
                   name="{{ field.html_name }}"
                   class="form-control {% if field.errors %}is-invalid{% endif %}"
                   {% if field.value %}value="{{ field.value }}"{% endif %}>
            {% for error in field.errors %}
              <div class="invalid-feedback">{{ error }}</div>
            {% endfor %}
          </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary w-100 mt-2">Войти</button>
      </form>
      <div class="text-center mt-3 small text-muted">
        Нет аккаунта? <a href="{% url 'users:register' %}">Зарегистрироваться</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
